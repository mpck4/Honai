# Cowrie SSH honeypot. Drop attackers into a fake shell on host port 22 while
# our real sshd listens on 2222.
#
# ────────────────────────────────────────────────────────────────────────────
# VPS PREP (do these BEFORE `docker compose up -d`):
#
#   1. Move real sshd off port 22:
#        sudo sed -i 's/^#\?Port 22$/Port 2222/' /etc/ssh/sshd_config
#        sudo systemctl restart ssh
#        # Reconnect on 2222 to confirm before closing the old session!
#
#   2. Allow inbound on both ports in the firewall:
#        sudo ufw allow 2222/tcp comment 'real-ssh'
#        sudo ufw allow 22/tcp   comment 'cowrie-honeypot'
#
#   3. Pre-create runtime dirs with Cowrie's UID (999 in the image):
#        mkdir -p var/log/cowrie var/lib/cowrie/downloads var/lib/cowrie/tty
#        sudo chown -R 999:999 var
#
# ────────────────────────────────────────────────────────────────────────────
# RUN:
#   docker compose up -d
#   docker compose logs -f cowrie     # confirm it boots
#   tail -f var/log/cowrie/cowrie.json # confirm JSON logging
#
# Then from another shell, point the tailer at the log:
#   python -m ingest.tail \
#     --cowrie-log honeypot/var/log/cowrie/cowrie.json \
#     --db /data/sessions.db \
#     --state /data/.tail.state
# ────────────────────────────────────────────────────────────────────────────

services:
  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped

    # Attackers hit host:22 → forwarded to Cowrie's internal 2222.
    ports:
      - "22:2222"

    # Bind-mount Cowrie's var/ onto the host so the JSON log and any
    # downloaded malware samples are reachable from the tailer + for forensics.
    # The host path lands at honeypot/var/* (gitignored).
    volumes:
      - ./var:/cowrie/cowrie-git/var

    # Disable telnet for now — SSH only. Cowrie's defaults are otherwise sane.
    environment:
      - COWRIE_TELNET_ENABLED=no

    # Cowrie doesn't need any privileged caps. Drop them all.
    cap_drop:
      - ALL

    # Light memory/CPU caps so a flood doesn't take the VPS down.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
